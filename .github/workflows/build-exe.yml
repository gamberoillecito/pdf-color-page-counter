name: Build Executable Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: macos-latest
            platform: macos
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          python -m PyInstaller pdf_color_bw_gui.spec --clean --distpath ./dist -y

      - name: Check build output
        shell: pwsh
        run: |
          $expected = "dist/PDF_Color_Page_Counter${{ matrix.ext }}"
          if (Test-Path $expected) {
            Write-Host "✅ BUILD SUCCESS"
            Get-Item $expected | Select-Object -Property FullName, @{Name="SizeMB";Expression={[math]::Round($_.Length/1MB,2)}}
          } else {
            throw "Build failed: output not found at $expected"
          }

      - name: Prepare release asset
        id: prep
        shell: pwsh
        run: |
          $ext = "${{ matrix.ext }}"
          $source = "dist/PDF_Color_Page_Counter$ext"
          $asset = "PDF_Color_Page_Counter-${{ matrix.platform }}-${{ runner.arch }}$ext"
          $zipName = "$asset.zip"

          Copy-Item $source "dist/$asset"
          Compress-Archive -Path "dist/$asset" -DestinationPath "dist/$zipName" -Force

          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prep.outputs.zip_name }}
          path: dist/${{ steps.prep.outputs.zip_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*.zip
          body: |
            ## Download and Run (No Python Required)

            This release includes standalone binaries for:
            - Windows
            - macOS
            - Linux

            Download the archive for your platform, extract it, and run the binary.

            Version: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
