name: Build Executable Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller pdf_color_bw_gui.spec --clean --distpath ./dist

      - name: Check build output
        run: |
          dir dist
          if (-not (Test-Path "dist/PDF_Color_Page_Counter.exe")) {
            Write-Error "Build failed: exe not found"
            Exit 1
          }

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/PDF_Color_Page_Counter.exe
          body: |
            ## 📥 Download & Run (No Python Required!)

            Simply download `PDF_Color_Page_Counter.exe` and run it directly on Windows 10/11.

            All dependencies are bundled in the executable.

            **Version**: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
