name: Build Executable Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          python -m PyInstaller pdf_color_bw_gui.spec --clean --distpath ./dist -y

      - name: Check build output
        run: |
          if (Test-Path "dist\PDF_Color_Page_Counter.exe") {
            Write-Host "✅ BUILD SUCCESS"
            Get-Item "dist\PDF_Color_Page_Counter.exe" | Select-Object -Property FullName, @{Name="SizeMB";Expression={[math]::Round($_.Length/1MB,2)}}
          } else {
            throw "Build failed: PDF_Color_Page_Counter.exe not found"
          }

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/PDF_Color_Page_Counter.exe
          body: |
            ## 📥 Download & Run (No Python Required!)

            Simply download `PDF_Color_Page_Counter.exe` and run it directly on Windows 10/11.

            All dependencies are bundled in the executable.

            **Version**: ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
